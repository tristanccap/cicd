name: Manual install
# Comment for diff
on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run tests?"
        required: true
        default: false
        type: boolean
  pull_request:
    types: 
      - opened
      - synchronize
      - reopened
    
jobs:
  install:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        
        ports:
          - 5432:5432

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "16"

    - name: Install dependencies
      run: npm install

    - name: Run build
      run: npm run build
   
    - name: Run tests
      if: ${{ inputs.run_tests || github.event.pull_request}}
      run: npm test
